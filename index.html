<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Tracking - Home</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968746.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body x-data="app()" class="bg-gray-50 text-gray-800 pb-24 h-screen overflow-y-auto no-scrollbar">

  <main class="max-w-md mx-auto w-full px-5 pb-20 space-y-6">
    <!-- HOME TAB -->
    <div class="pt-8">
      <!-- Total Uang -->
      <div class="bg-blue-500 rounded-2xl p-5 text-white relative overflow-hidden mb-4">
        <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500 rounded-full opacity-50 blur-2xl"></div>
        <div class="absolute -left-4 -bottom-4 w-24 h-24 bg-blue-900 rounded-full opacity-50 blur-2xl"></div>
        <div class="relative z-10">
          <p class="text-white text-sm font-medium mb-1">Total Uang Anda</p>
          <h2 class="font-bold text-xl tracking-tight" x-text="formatRupiah(totalMoney())"></h2>
        </div>
      </div>

      <!-- Saldo Cards -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-white rounded-2xl p-4 border border-gray-100 flex flex-col">
          <div class="flex flex-row items-center justify-between text-gray-500">
            <span class="text-xs font-semibold">Tunai</span>
            <div class="w-7 h-7 rounded-full bg-gray-50 text-gray-600 flex items-center justify-center">
              <iconify-icon icon="solar:wallet-outline" width="16"></iconify-icon>
            </div>
          </div>
          <p class="text-base font-bold text-gray-900 tracking-tight leading-none" x-text="formatRupiah(cash)"></p>
        </div>
        <div class="bg-white rounded-2xl p-4 border border-gray-100 flex flex-col">
          <div class="flex flex-row items-center justify-between text-gray-500">
            <span class="text-xs font-semibold">Non Tunai</span>
            <div class="w-7 h-7 rounded-full bg-gray-50 text-gray-600 flex items-center justify-center">
              <iconify-icon icon="solar:card-outline" width="16"></iconify-icon>
            </div>
          </div>
          <p class="text-base font-bold text-gray-900 tracking-tight leading-none" x-text="formatRupiah(cashless)"></p>
        </div>
      </div>

      <!-- Limit Harian -->
      <div class="bg-white rounded-2xl p-4 border border-gray-100 mb-4">
        <div class="flex justify-between items-center mb-3">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gray-50 text-gray-600 flex items-center justify-center">
              <iconify-icon icon="solar:pie-chart-2-outline" width="18"></iconify-icon>
            </div>
            <h3 class="font-bold text-gray-800">Limit Harian</h3>
          </div>
          <span class="text-xs font-semibold px-2 py-1 rounded-full bg-gray-50 text-gray-600 border border-gray-100">
            <span x-text="formatRupiah(dailyLimit - dailySpent)"></span> sisa
          </span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-2.5 mb-1 overflow-hidden">
          <div class="bg-blue-600 h-2.5 rounded-full" :style="`width: ${Math.min((dailySpent/dailyLimit)*100, 100)}%`">
          </div>
        </div>
        <div class="flex justify-between text-xs text-gray-500 mt-2 font-medium">
          <span x-text="`Terpakai: ${formatRupiah(dailySpent)}`"></span>
          <span x-text="`Limit: ${formatRupiah(dailyLimit)}`"></span>
        </div>
      </div>
      <!-- Chart Section -->
      <div class="bg-white rounded-2xl p-4 border border-gray-100 mb-4 h-64 flex flex-col">
        <h3 class="font-bold text-gray-800 text-sm mb-3">Statistik 7 Hari Terakhir</h3>
        <div class="flex-1 min-h-0">
          <canvas id="historyChart"></canvas>
        </div>
      </div>
      <!-- Riwayat List -->
      <div class="mb-4 flex justify-between items-center">
        <h3 class="font-bold text-lg text-gray-900">Riwayat Terakhir</h3>
        <button @click="openHistoryModal()"
          class="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-sm hover:bg-blue-700 transition-colors flex items-center gap-1">
          <span>Tambah</span>
        </button>
      </div>

      <div class="space-y-3">
        <template x-for="history in histories" :key="history.id">
          <div @click="openHistoryModal(history)"
            class="bg-white rounded-2xl p-4 border border-gray-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-white"
                :class="history.type === 'Pemasukkan' ? 'bg-green-500' : 'bg-red-500'">
                <iconify-icon
                  :icon="history.type === 'Pemasukkan' ? 'solar:arrow-left-down-bold' : 'solar:arrow-right-up-bold'"
                  width="20"></iconify-icon>
              </div>
              <div>
                <p class="font-bold text-sm text-gray-900 leading-tight" x-text="history.name"></p>
                <div class="flex items-center gap-1 mt-1 text-[11px] text-gray-500 font-medium">
                  <span x-text="history.source"></span>
                  <span class="w-1 h-1 rounded-full bg-gray-300"></span>
                  <span x-text="history.date"></span>
                </div>
              </div>
            </div>
            <div class="flex flex-col items-end gap-1">
              <p class="font-bold text-sm" :class="history.type === 'Pemasukkan' ? 'text-green-600' : 'text-red-500'"
                x-text="(history.type === 'Pemasukkan' ? '+' : '-') + formatRupiah(history.amount)"></p>
            </div>
          </div>
        </template>
        <div x-show="histories.length === 0"
          class="text-center py-6 text-gray-400 text-sm font-medium border border-gray-100 rounded-2xl border-dashed">
          Belum ada riwayat
        </div>
      </div>
    </div>
  </main>

  <!-- Navigation -->
  <div
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 bg-zinc-900 rounded-full px-3.5 py-2.5 shadow-2xl">
    <a href="index.html"
      class="flex items-center justify-center w-11 h-11 rounded-full bg-white text-zinc-900 transition-all duration-150">
      <iconify-icon icon="solar:home-2-bold" width="22"></iconify-icon>
    </a>

    <a href="savings.html"
      class="flex items-center justify-center w-11 h-11 rounded-full text-white/45 hover:text-white/80 hover:bg-white/10 transition-all duration-150">
      <iconify-icon icon="solar:money-bag-linear" width="22"></iconify-icon>
    </a>

    <a href="notes.html"
      class="flex items-center justify-center w-11 h-11 rounded-full text-white/45 hover:text-white/80 hover:bg-white/10 transition-all duration-150">
      <iconify-icon icon="solar:clipboard-list-linear" width="22"></iconify-icon>
    </a>

    <a href="settings.html"
      class="flex items-center justify-center w-11 h-11 rounded-full text-white/45 hover:text-white/80 hover:bg-white/10 transition-all duration-150">
      <iconify-icon icon="solar:settings-linear" width="22"></iconify-icon>
    </a>
  </div>

  <!-- History Modal (Hanya di Home) -->
  <div x-show="showHistoryModal" style="display: none;"
    class="fixed inset-0 z-[60] flex items-center justify-center px-4">
    <div x-show="showHistoryModal" x-transition.opacity class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm"
      @click="showHistoryModal = false"></div>
    <div x-show="showHistoryModal" x-transition.scale
      class="relative bg-white rounded-2xl w-full max-w-sm p-6 border border-gray-100 shadow-xl overflow-y-auto max-h-[90vh]">
      <h3 class="font-bold text-xl text-gray-900 mb-5" x-text="historyEditId ? 'Edit Riwayat' : 'Tambah Riwayat'"></h3>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">Jenis</label>
          <div class="grid grid-cols-2 gap-2">
            <label class="cursor-pointer">
              <input type="radio" x-model="formType" value="Pengeluaran" class="peer sr-only">
              <div
                class="text-center py-2.5 rounded-xl border border-gray-100 text-sm font-bold text-gray-500 peer-checked:bg-red-50 peer-checked:text-red-600 peer-checked:border-red-200 transition-colors">
                Pengeluaran</div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" x-model="formType" value="Pemasukkan" class="peer sr-only">
              <div
                class="text-center py-2.5 rounded-xl border border-gray-100 text-sm font-bold text-gray-500 peer-checked:bg-green-50 peer-checked:text-green-600 peer-checked:border-green-200 transition-colors">
                Pemasukkan</div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">Sumber</label>
          <div class="grid grid-cols-2 gap-2">
            <label class="cursor-pointer">
              <input type="radio" x-model="formSource" value="Tunai" class="peer sr-only">
              <div
                class="text-center py-2.5 rounded-xl border border-gray-100 text-sm font-bold text-gray-500 peer-checked:bg-blue-50 peer-checked:text-blue-600 peer-checked:border-blue-200 transition-colors">
                Tunai</div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" x-model="formSource" value="Non Tunai" class="peer sr-only">
              <div
                class="text-center py-2.5 rounded-xl border border-gray-100 text-sm font-bold text-gray-500 peer-checked:bg-blue-50 peer-checked:text-blue-600 peer-checked:border-blue-200 transition-colors">
                Non Tunai</div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">Nama Riwayat</label>
          <input type="text" x-model="formName" placeholder="Contoh: Makan Siang"
            class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">Tanggal</label>
          <input type="date" x-model="formDate"
            class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">Nominal</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm">Rp</span>
            <input type="number" x-model.number="formAmount" placeholder="0"
              class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 pl-12 pr-4 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div class="pt-2 flex flex-col gap-2">
          <div class="flex gap-3">
            <button @click="showHistoryModal = false"
              class="w-full py-3 rounded-xl font-bold text-sm text-gray-500 bg-gray-50 hover:bg-gray-100 transition-colors">Batal</button>
            <button @click="saveHistory"
              class="w-full py-3 rounded-xl font-bold text-sm text-white bg-blue-600 hover:bg-blue-700 transition-colors">Simpan</button>
          </div>
          <button x-show="historyEditId" @click="deleteHistory(historyEditId)"
            class="w-full py-3 rounded-xl font-bold text-sm text-red-500 hover:bg-red-50 transition-colors">Hapus
            Riwayat</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/home.js"></script>
</body>

</html>
