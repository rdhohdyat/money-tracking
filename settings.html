<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Tracking - Settings</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968746.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body x-data="app()" class="bg-gray-50 text-gray-800 pb-24 h-screen overflow-y-auto no-scrollbar">

  <main class="max-w-md mx-auto w-full px-5 pb-20 space-y-6">
    <!-- SETTINGS TAB -->
    <div class="pt-8">
      <h2 class="font-bold text-lg text-gray-900 mb-4">Pengaturan</h2>

      <div class="space-y-4">
        <div class="bg-white rounded-2xl p-5 border border-gray-100 space-y-4">
          <h3 class="font-bold text-gray-800 text-sm flex items-center gap-2 mb-2">
            <iconify-icon icon="solar:wallet-money-bold-duotone" class="text-blue-500" width="20"></iconify-icon> Saldo
            Aktif
          </h3>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Jumlah Tunai</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm">Rp</span>
              <input type="number" x-model.number="cash"
                class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 pl-12 pr-4 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Jumlah Non Tunai</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm">Rp</span>
              <input type="number" x-model.number="cashless"
                class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 pl-12 pr-4 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-5 border border-gray-100 space-y-4">
          <h3 class="font-bold text-gray-800 text-sm flex items-center gap-2 mb-2">
            <iconify-icon icon="solar:pie-chart-2-bold-duotone" class="text-blue-500" width="20"></iconify-icon> Limit
            Pengeluaran
          </h3>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Batas Harian</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm">Rp</span>
              <input type="number" x-model.number="dailyLimit"
                class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 pl-12 pr-4 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <button @click="resetDailyLimit"
            class="w-full bg-gray-50 text-gray-700 font-bold text-sm py-3 rounded-xl border border-gray-100 hover:bg-gray-100 transition-colors flex items-center justify-center gap-2">
            <iconify-icon icon="solar:refresh-circle-bold" width="18"></iconify-icon> Reset Pengeluaran Hari Ini
          </button>
        </div>

        <div class="bg-white rounded-2xl p-5 border border-gray-100 space-y-4">
          <h3 class="font-bold text-gray-800 text-sm flex items-center gap-2 mb-2">
            <iconify-icon icon="solar:document-text-bold-duotone" class="text-blue-500" width="20"></iconify-icon> Data Aplikasi
          </h3>
          <p class="text-xs text-gray-500 font-medium">Export seluruh riwayat transaksi Anda ke dalam format file Excel (.csv).</p>
          <button @click="exportToCSV"
            class="w-full bg-green-50 text-green-700 font-bold text-sm py-3 rounded-xl border border-green-100 hover:bg-green-100 transition-colors flex items-center justify-center gap-2">
            <iconify-icon icon="solar:download-square-bold" width="18"></iconify-icon> Export Riwayat (CSV)
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Navigation -->
  <div
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 bg-zinc-900 rounded-full px-3.5 py-2.5 shadow-2xl">
    <a href="index.html"
      class="flex items-center justify-center w-11 h-11 rounded-full text-white/45 hover:text-white/80 hover:bg-white/10 transition-all duration-150">
      <iconify-icon icon="solar:home-2-linear" width="22"></iconify-icon>
    </a>

    <a href="savings.html"
      class="flex items-center justify-center w-11 h-11 rounded-full text-white/45 hover:text-white/80 hover:bg-white/10 transition-all duration-150">
      <iconify-icon icon="solar:money-bag-linear" width="22"></iconify-icon>
    </a>

    <a href="notes.html"
      class="flex items-center justify-center w-11 h-11 rounded-full text-white/45 hover:text-white/80 hover:bg-white/10 transition-all duration-150">
      <iconify-icon icon="solar:clipboard-list-linear" width="22"></iconify-icon>
    </a>

    <a href="settings.html"
      class="flex items-center justify-center w-11 h-11 rounded-full bg-white text-zinc-900 transition-all duration-150">
      <iconify-icon icon="solar:settings-bold" width="22"></iconify-icon>
    </a>
  </div>

  <script src="js/common.js"></script>
  <script src="js/settings.js"></script>
</body>

</html>
